<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ETFforAI · 登录</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif}
        body{background:#f5f6f8;padding:20px;max-width:480px;margin:0 auto}
        .login-box{background:#fff;border-radius:12px;padding:30px;margin-top:50px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .title{text-align:center;font-size:22px;font-weight:600;color:#222;margin-bottom:30px}
        .input-item{margin-bottom:20px}
        label{font-size:15px;color:#666;margin-bottom:8px;display:block}
        input{width:100%;padding:12px;border-radius:8px;border:1px solid #e0e0e0;font-size:16px}
        button{width:100%;padding:12px;border-radius:8px;border:none;background:#c9a86c;color:white;font-size:16px;cursor:pointer;margin-top:10px}
        button:disabled{background:#ccc}
        .error{color:#ff4d4f;font-size:14px;margin-top:10px;text-align:center}
    </style>
</head>
<body>
    <div class="login-box">
        <div class="title">🔐 ETFforAI · 登录</div>
        <div class="input-item">
            <label>账号</label>
            <input type="text" id="username" placeholder="请输入账号">
        </div>
        <div class="input-item">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button onclick="login()" id="loginBtn">登录</button>
        <div class="error" id="errorMsg"></div>
    </div>

    <script>
        async function login() {
            const btn = document.getElementById('loginBtn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            // 前端简单校验
            if (!username || !password) {
                errorMsg.textContent = '账号和密码不能为空';
                return;
            }
            
            btn.disabled = true;
            errorMsg.textContent = '';
            
            try {
                const resp = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await resp.json();
                
                if (data.code === 200) {
                    // 登录成功跳转至ETF分析页
                    window.location.href = '/index';
                } else {
                    errorMsg.textContent = data.msg;
                }
            } catch (e) {
                errorMsg.textContent = '登录请求失败，请重试';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
