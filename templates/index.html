<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI for ETF · 智能投资分析</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif}
        body{background:#f5f6f8;padding:20px;max-width:480px;margin:0 auto}
        .title{text-align:center;font-size:22px;font-weight:600;color:#222;margin-bottom:20px}
        .select-box{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        select,button{width:100%;padding:12px;border-radius:8px;border:1px solid #e0e0e0;font-size:16px;margin-top:10px}
        button{background:#c9a86c;color:white;border:none;cursor:pointer}
        button:disabled{background:#ccc}
        .result-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .card-header{margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
        .card-title{font-size:18px;font-weight:600;margin-bottom:8px}
        .card-code{font-size:14px;color:#666;margin-bottom:8px}
        .card-date{font-size:14px;color:#999;/* 日期单独样式 */}
        .info-row{display:flex;justify-content:space-between;margin-bottom:16px}
        .info-col{width:48%}
        .label{font-size:14px;color:#666;margin-bottom:6px}
        .suggest{display:inline-block;padding:8px 14px;background:#fff9e6;border:1px solid #e6d5a8;border-radius:8px;font-size:16px;font-weight:600;color:#b4883d}
        .date{font-size:16px;color:#333}
        .reason{margin-top:16px;font-size:15px;line-height:1.7;color:#333;white-space:pre-line}
        .loading{color:#999;font-style:italic;line-height:1.8;}
        .loading-item::before{content:'▸ ';color:#c9a86c;animation:blink 1s infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
    </style>
</head>
<body>
    <div class="title">📊 AI for ETF · 智能分析</div>
    <div class="select-box">
        <label>选择ETF标的：</label>
        <select id="etfSel">
            {% for e in etf_list %}
            <option value="{{e}}">{{e}}</option>
            {% endfor %}
        </select>
        <button onclick="analyze()" id="btn">开始分析</button>
    </div>
    <div id="result"></div>

    <script>
        let isAnalyzing = false;
        let timers = [];
        async function analyze() {
            if (isAnalyzing) return;
            const btn = document.getElementById('btn');
            const res = document.getElementById('result');
            const key = document.getElementById('etfSel').value;
            
            btn.disabled = true;
            isAnalyzing = true;
            timers.forEach(clearTimeout);
            timers = [];

            // 初始化加载界面
            res.innerHTML = `
                <div class="result-card">
                    <div class="loading" id="loading-content">
                        <div class="loading-item">🧠 AI正在获取对应标的相关数据和信息...</div>
                    </div>
                </div>
            `;
            const loadingContent = document.getElementById('loading-content');

            // 逐步加载思考过程
            timers.push(setTimeout(() => {
                loadingContent.innerHTML += '<div class="loading-item">🧠 AI正在分析理解数据和信息背后的含义...</div>';
            }, 5000));
            timers.push(setTimeout(() => {
                loadingContent.innerHTML += '<div class="loading-item">🧠 AI正在结合过去的分析对新的内容生成对应的判断...</div>';
            }, 10000));
            timers.push(setTimeout(() => {
                loadingContent.innerHTML += '<div class="loading-item">🧠 AI正在生成对应的分析结果...</div>';
            }, 15000));

            try {
                // 调用后端接口
                const resp = await fetch('/get_advice', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({etf_key: key})
                });
                const data = await resp.json();

                // 确保等待20秒后展示结果
                await new Promise(resolve => {
                    timers.push(setTimeout(resolve, 20000));
                });

                if (data.code !== 200) {
                    res.innerHTML = `<div class="result-card">${data.msg}</div>`;
                    return;
                }

                const d = data.data;
                const txt = `基于当前信息，我${d.suggest==='买入'?'建议买入':d.suggest==='持有'?'建议持有':'建议观望'}。\n\n${d.reason}`;
                
                // 渲染结果（日期单独一行）
                res.innerHTML = `<div class="result-card">
                    <div class="card-header">
                        <div class="card-title">投资建议</div>
                        <div class="card-code">${d.code} | ${d.name}</div>
                        <div class="card-date">分析日期：${d.date}</div> <!-- 日期单独一行 -->
                    </div>
                    <div class="info-row">
                        <div class="info-col"><div class="label">操作建议</div><div class="suggest">${d.suggest}</div></div>
                        <div class="info-col"><div class="label">信心度</div><div class="date">${d.confidence}</div></div>
                    </div>
                    <div class="reason" id="text"></div>
                </div>`;
                
                // 打字机效果
                let i = 0, t = document.getElementById('text');
                const itv = setInterval(() => {
                    if (i >= txt.length) {
                        clearInterval(itv);
                        return;
                    }
                    t.textContent += txt[i];
                    i++;
                }, 15);

            } catch (e) {
                await new Promise(resolve => {
                    timers.push(setTimeout(resolve, 20000));
                });
                res.innerHTML = '<div class="result-card">⚠️ 网络异常，请重试</div>';
            } finally {
                timers.forEach(clearTimeout);
                timers = [];
                btn.disabled = false;
                isAnalyzing = false;
            }
        }
    </script>
</body>
</html>
