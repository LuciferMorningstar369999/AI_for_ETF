function startAnalyze() {
    const sel = document.getElementById("etfSelect");
    const key = sel.value;
    const thinkOut = document.getElementById("thinkOutput");
    const resBox = document.getElementById("result");
    const btn = document.querySelector("button");
    
    thinkOut.innerHTML = "";
    resBox.style.display = "none";
    btn.disabled = true;

    const list = thinkText[key] || ["【AI】正在分析..."];
    let i = 0;
    const timer = setInterval(() => {
        if (i >= list.length) {
            clearInterval(timer);
            btn.disabled = false;
            resBox.style.display = "block";
            resBox.innerText = "✅ AI for ETF 分析完成：建议根据趋势理性决策，以上内容不构成投资建议。";
            return;
        }
        const div = document.createElement("div");
        div.className = "think-line";
        div.innerText = list[i];
        thinkOut.appendChild(div);
        thinkOut.scrollTop = thinkOut.scrollHeight;
        i++;
    }, 1000);
}
